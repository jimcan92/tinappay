<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="application-name" content="tinAPPay ERP" />
		<meta name="description" content="Lenie's Choice Bakery — tinAPPay Bakery ERP: Sales & Inventory" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			try {
				const mode = localStorage.getItem('theme-mode');
				document.documentElement.classList.add(mode === 'dark' ? 'dark' : 'light');
			} catch (_) {
				document.documentElement.classList.add('light');
			}
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-surface text-on-surface selection:bg-primary/10 selection:text-primary antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
