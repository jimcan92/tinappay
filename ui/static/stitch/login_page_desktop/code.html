<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none">
<img class="w-full h-full object-cover" data-alt="Close-up of flour dusted on a wooden artisanal bakery table with subtle textures and warm morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBiFAN5SIHdeh2LkduRKqYaFDb1KMz57J-0z9gWs_VUOForx4ROjSH8zL4xzXsPcXcRJKcE_bG3Qcby9VToBcsZUjNjZzQy0A2KSRnPo3VQ2tvdOZx5wlwl8207Mhqa1T52SfTt4DCufApKHnH9GV7ekVhYojHUi3OBOrQnv7Bhstov7su5H0vlknQNKoPydjX6TnI2rw68MLDAsEEh5YvQ9UsqflQw9GpuHkJmxn8KJ4U1KfwTrYlvvxoZZxbhN7DGG3uQj7fFf0U"/>
</div>
<div class="absolute top-0 right-0 p-12 hidden lg:block opacity-20">
<span class="material-symbols-outlined text-[12rem] text-primary rotate-12">bakery_dining</span>
</div>
<div class="z-10 w-full max-w-[440px]">
<div class="bg-surface-container-lowest/90 backdrop-blur-xl p-8 md:p-12 rounded-[2rem] shadow-[0px_12px_32px_rgba(47,47,44,0.06)] border border-surface-container-high">
<header class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-secondary-container mb-6">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">restaurant_menu</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-on-surface leading-tight">The Artisanal Ledger</h1>
<p class="text-on-surface-variant font-body text-sm mt-2">Manage your craft with precision.</p>
</header>
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-2xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all" id="email" name="email" placeholder="baker@artisanal.ledger" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-xl">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-2xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center space-x-3 px-1">
<input class="w-5 h-5 rounded-md border-outline-variant text-primary focus:ring-primary/30 bg-surface-container-low cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant font-medium cursor-pointer select-none" for="remember">Remember Me</label>
</div>
<button class="editorial-gradient w-full py-4 px-6 text-on-primary font-bold text-lg rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200" type="submit">
                        Sign In
                    </button>
</form>
<div class="mt-10 text-center">
<p class="text-sm text-on-surface-variant">
                        Need assistance? 
                        <a class="font-bold text-on-surface hover:text-primary transition-colors underline decoration-outline-variant underline-offset-4" href="#">Contact Support</a>
</p>
</div>
</div>
<div class="mt-8 text-center">
<p class="font-headline text-[0.65rem] uppercase tracking-[0.2em] text-on-surface-variant/60 font-semibold">Boutique ERP for Professional Master Bakers</p>
</div>
</div>
